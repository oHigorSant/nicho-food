<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoop Food | Assessoria de Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #05010d; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased">

    <section class="min-h-screen flex items-center justify-center py-12 px-6 bg-gradient-to-b from-[#020005] to-[#05010d]">
        <div class="max-w-4xl w-full grid lg:grid-cols-2 gap-12 items-center">
            
            <div>
                <img src="images/LOGO.webp" alt="Zoop" class="h-8 mb-8">
                <h1 class="text-4xl md:text-5xl font-black mb-6 leading-tight">
                    Escale seu <span class="text-purple-500">Delivery</span> ou <span class="text-pink-500">Restaurante</span>.
                </h1>
                <p class="text-gray-400 text-lg font-light mb-8">
                    Não vendemos anúncios. Construímos uma máquina previsível de atrair e converter clientes famintos.
                </p>
                <div class="flex items-center gap-3 text-green-400 font-bold text-sm uppercase tracking-wider">
                    <i data-lucide="check-circle"></i> Especialistas em Food Service
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl shadow-2xl relative">
                <h3 class="text-2xl font-bold mb-6">Solicitar Diagnóstico Food</h3>
                
                <form id="foodForm" class="space-y-4">
                    <input id="nome" type="text" placeholder="Seu nome completo" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:border-purple-500 outline-none transition-all" required>
                    
                    <input id="empresa" type="text" placeholder="Nome do Restaurante / Empresa" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:border-purple-500 outline-none transition-all" required>
                    
                    <div class="flex gap-2">
                        <select id="countryCode" class="bg-white/5 border border-white/10 rounded-2xl px-3 py-3 outline-none text-sm w-28">
                            <option value="+55" selected>🇧🇷 +55</option>
                        </select>
                        <input type="tel" id="phone" placeholder="(XX) XXXXX-XXXX" 
                               class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:border-purple-500 outline-none transition-all" required>
                    </div>

                    <select id="faturamento" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:border-purple-500 outline-none text-gray-400" required>
                        <option value="" disabled selected>Faturamento mensal médio?</option>
                        <option>Até 40 mil</option>
                        <option>De 41 mil à 100 mil</option>
                        <option>De 101 mil à 250 mil</option>
                        <option>Acima de 250 mil</option>
                    </select>

                    <select id="segmento" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:border-purple-500 outline-none text-gray-400" required>
                        <option value="Food Service" selected>Food Service</option>
                        <option>Indústria de Alimentos</option>
                        <option>Franquia Alimentar</option>
                        <option>Outro</option>
                    </select>

                    <button type="submit" id="btnEnviar" 
                            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-5 rounded-2xl uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-purple-600/20 mt-4">
                        Acelerar meu Restaurante
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // 1. MÁSCARA DE TELEFONE AUTOMÁTICA
            const phoneInput = document.getElementById('phone');
            phoneInput.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 11) v = v.slice(0, 11);
                
                if (v.length > 10) {
                    v = v.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                } else if (v.length > 6) {
                    v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
                } else if (v.length > 2) {
                    v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
                } else if (v.length > 0) {
                    v = v.replace(/^(\d{0,2})/, '($1');
                }
                e.target.value = v;
            });

            // 2. ENVIO DOS DADOS
            const form = document.getElementById('foodForm');
            const btn = document.getElementById('btnEnviar');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = "Enviando...";

                const tel = phoneInput.value.replace(/\D/g, '');
                const ddi = document.getElementById('countryCode').value.replace(/\D/g, '');
                const params = new URLSearchParams(window.location.search);

                const payload = {
                    nome: document.getElementById('nome').value,
                    empresa: document.getElementById('empresa').value,
                    telefone: ddi + tel,
                    // O campo objetivo concatena os dados para facilitar a leitura na dashboard
                    objetivo: `Fat: ${document.getElementById('faturamento').value} | Seg: ${document.getElementById('segmento').value}`,
                    origem: "Nicho Food", // RÓTULO FIXO PARA SUA TRIAGEM
                    utm_source: params.get('utm_source') || 'Nicho Food',
                    utm_campaign: params.get('utm_campaign') || 'Direto'
                };

                try {
                    const response = await fetch('https://api.zoopcompany.com.br/api/novo_lead_site', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        btn.innerHTML = "Recebido!";
                        btn.classList.replace('from-purple-600', 'bg-green-600');
                        alert("Pedido de diagnóstico recebido! Nosso especialista em Food Service entrará em contato.");
                        form.reset();
                    } else {
                        alert("Erro ao enviar. Tente novamente ou chame no Whats.");
                    }
                } catch (error) {
                    alert("Falha na conexão com o servidor.");
                } finally {
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-600');
                        btn.classList.add('from-purple-600');
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
